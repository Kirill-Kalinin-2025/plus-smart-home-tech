spring:
  kafka:
    bootstrap-servers: localhost:9092
  main:
    allow-bean-definition-overriding: true

aggregator:
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      input: telemetry.sensors.v1
      output: telemetry.snapshots.v1

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.apache.kafka: WARN
    org.apache.avro: WARN