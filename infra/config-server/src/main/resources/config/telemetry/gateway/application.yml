server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # Роут для корзины
        - id: shopping-cart-route
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**
          filters:
            - PrefixPath=/api/v1

        # Роут для витрины товаров с Retry
        - id: shopping-store-route
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**
          filters:
            - PrefixPath=/api/v1
            - name: Retry
              args:
                retries: 3
                statuses: NOT_FOUND
                methods: GET
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

  main:
    web-application-type: reactive

logging:
  level:
    org.springframework.cloud.gateway: DEBUG